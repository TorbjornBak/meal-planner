<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · MealPlanner</title>
    <style>
      :root {
        --bg: #faf9f7;
        --fg: #1c1b1a;
        --muted: #6b6863;
        --accent: #b5563a;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 2rem;
        text-align: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        max-width: 22rem;
        color: var(--muted);
        line-height: 1.5;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.4rem;
        font-size: 1rem;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>
      This page hasn't been opened while online yet, so there's nothing cached to
      show. Pages you've visited with a connection stay available offline.
    </p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
