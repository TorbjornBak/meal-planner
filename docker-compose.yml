# MealPlanner — app + Postgres (§10, §12).
#
# HTTPS is handled by `tailscale serve` on the host, not by a reverse proxy in
# Compose. The app publishes port 3000 to the host loopback; tailscaled (running
# on the host, joined to the tailnet) serves it over HTTPS on the MagicDNS
# *.ts.net name:
#
#   tailscale serve --bg 3000
#
# That exposes the app on the tailnet only — no public exposure, no
# port-forwarding, no cert management (§10).

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mealplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealplanner}
      POSTGRES_DB: ${POSTGRES_DB:-mealplanner}
    ports:
      # Loopback-only, so `npm run dev` on the host can reach it without
      # exposing Postgres to the tailnet. The app container talks to `db`
      # over the compose network regardless.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealplanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-mealplanner}:${POSTGRES_PASSWORD:-mealplanner}@db:5432/${POSTGRES_DB:-mealplanner}?schema=public"
      HOUSEHOLD_PASSWORD: ${HOUSEHOLD_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
    ports:
      # Loopback-only; `tailscale serve` on the host proxies this to the tailnet
      # over HTTPS. Not reachable from the LAN.
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
