# Fast feedback on every push and pull request: types must check out.
# The heavier `next build` is covered by the image build in deploy.yml.
name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  typecheck:
    runs-on: docker
    container:
      image: node:22-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      # tsc needs the generated Prisma client to resolve @prisma/client types.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck
